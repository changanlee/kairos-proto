syntax = "proto3";

package kairos.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/changanlee/kairos-api/gen/proto/kairos/v1;kairosv1";

// ScheduleService owns the day-plan lifecycle. Each response wraps the
// ScheduledDay payload in a method-specific message — buf STANDARD lint
// disallows sharing a response type across RPCs because it makes the
// generated code's request / response pairs ambiguous in some clients.
service ScheduleService {
  rpc GenerateDailySchedule(GenerateDailyScheduleRequest) returns (GenerateDailyScheduleResponse);
  rpc GetDailySchedule(GetDailyScheduleRequest) returns (GetDailyScheduleResponse);
  rpc RegenerateRemainder(RegenerateRemainderRequest) returns (RegenerateRemainderResponse);
  rpc UpdateSlotStatus(UpdateSlotStatusRequest) returns (UpdateSlotStatusResponse);
  rpc ReorderSlots(ReorderSlotsRequest) returns (ReorderSlotsResponse);
  // Story 5.2: 15-second grace-window Undo for accidental swipe-completions.
  // The client passes back the completion_event_id it received in
  // UpdateSlotStatusResponse; server applies a DB-level time gate and
  // FK cascade-deletes the related energy_checkin atomically.
  rpc UndoCompletion(UndoCompletionRequest) returns (UndoCompletionResponse);
}

message ScheduledDay {
  string user_id = 1;
  // ISO date YYYY-MM-DD in user's timezone (users.timezone)
  string date = 2;
  // "llm" | "rule_engine"
  string generated_by = 3;
  // Empty when generated_by="rule_engine"
  string llm_explanation = 4;
  repeated ScheduleSlot slots = 5;
  google.protobuf.Timestamp generated_at = 6;
  // FR20 capacity warning; empty when no overflow.
  string warning_message = 7;
}

message ScheduleSlot {
  string slot_id = 1;
  // "task" | "calendar_block" | "break"
  string kind = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
  // "warmup" | "peak" | "gap"
  string slot_type = 5;
  string status = 6;
  string task_id = 7;
  TaskSnapshot task_snapshot = 8;
  repeated Pomodoro pomodoros = 9;
  string explanation = 10;
  CalendarEventRef calendar_event = 11;
  string recurrence_instance_of = 12;
}

message TaskSnapshot {
  string title = 1;
  int32 duration_min = 2;
  string dream_binding = 3;
  string difficulty = 4;
}

message Pomodoro {
  int32 index = 1;
  google.protobuf.Timestamp work_start = 2;
  google.protobuf.Timestamp work_end = 3;
  google.protobuf.Timestamp break_start = 4;
  google.protobuf.Timestamp break_end = 5;
}

message CalendarEventRef {
  string gcal_event_id = 1;
  string summary = 2;
  // "" | "travel" | "vacation" | "sick_leave" | "meeting"
  string life_mode = 3;
}

message GenerateDailyScheduleRequest {
  string date = 1; // YYYY-MM-DD
}

message GenerateDailyScheduleResponse {
  ScheduledDay day = 1;
}

message GetDailyScheduleRequest {
  string date = 1;
}

message GetDailyScheduleResponse {
  ScheduledDay day = 1;
}

message RegenerateRemainderRequest {
  string date = 1;
}

message RegenerateRemainderResponse {
  ScheduledDay day = 1;
}

message UpdateSlotStatusRequest {
  string date = 1;
  string slot_id = 2;
  string status = 3;
  // Story 5.2: optional energy self-report. Empty string = "user skipped
  // the check-in" (we still write the completion_event, no energy_checkin).
  // Only honored when status == "completed".
  string energy_level = 4; // "" | "green" | "yellow" | "red"
  // Story 5.2: optional. Server clamps to [slot.start, now()] — clients
  // can't backdate or pre-date a completion outside the slot's window.
  google.protobuf.Timestamp client_completed_at = 5;
}

message UpdateSlotStatusResponse {
  ScheduleSlot slot = 1;
  // Story 5.2: populated when status == "completed". Frontend passes this
  // back to UndoCompletion to disambiguate concurrent completion writes
  // (see Story 5.3 Postpone-Layer-1 race).
  string completion_event_id = 2;
  // Story 5.2: populated when energy_level was provided.
  string energy_checkin_id = 3;
}

message UndoCompletionRequest {
  string date = 1;
  string slot_id = 2;
  // Required: returned from UpdateSlotStatusResponse. Server matches against
  // this exact id (not "latest completion for slot") to stay idempotent
  // under retries and concurrent postpone flows.
  string completion_event_id = 3;
}

message UndoCompletionResponse {
  ScheduleSlot slot = 1;
  // True when an energy_checkin row was cascade-deleted along with the
  // completion_event. Frontend uses this to decide whether to re-show the
  // EnergyCheckIn prompt or skip straight back to the swipeable slot.
  bool energy_checkin_reverted = 2;
}

message ReorderSlotsRequest {
  string date = 1;
  repeated string slot_order = 2;
}

message ReorderSlotsResponse {
  ScheduledDay day = 1;
}
